name: Build and Release

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  schedule:
    - cron: "0 3 * * *"   # every day at 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6

      - name: Set up Python
        run: uv python install 3.12

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "stable"

      - name: Cache tools
        uses: actions/cache@v4
        with:
          path: tools/
          key: tools-${{ hashFiles('.github/workflows/build.yml') }}

      - name: Cache previous data
        uses: actions/cache@v4
        with:
          path: data/
          key: data-${{ github.run_id }}
          restore-keys: data-

      - name: Build geoip tool (Loyalsoldier/geoip)
        run: |
          if [ -f tools/geoip ]; then echo "cached"; exit 0; fi
          mkdir -p tools
          git clone --depth 1 https://github.com/Loyalsoldier/geoip.git /tmp/geoip-src
          cd /tmp/geoip-src
          go build -o $GITHUB_WORKSPACE/tools/geoip .
          echo "geoip built: $($GITHUB_WORKSPACE/tools/geoip 2>&1 | head -1 || true)"

      - name: Build domain-list-community (geosite)
        run: |
          if [ -f tools/dlc ]; then echo "cached"; exit 0; fi
          mkdir -p tools
          git clone --depth 1 https://github.com/v2fly/domain-list-community.git /tmp/dlc-src
          cd /tmp/dlc-src
          go build -o $GITHUB_WORKSPACE/tools/dlc .
          echo "dlc built"

      - name: Download sing-box
        run: |
          if [ -f tools/sing-box ]; then echo "cached"; exit 0; fi
          mkdir -p tools
          SINGBOX_VERSION=$(curl -sL \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            https://api.github.com/repos/SagerNet/sing-box/releases/latest \
            | jq -r '.tag_name')
          SINGBOX_VERSION_CLEAN="${SINGBOX_VERSION#v}"
          echo "sing-box version: ${SINGBOX_VERSION}"
          curl -sL "https://github.com/SagerNet/sing-box/releases/download/${SINGBOX_VERSION}/sing-box-${SINGBOX_VERSION_CLEAN}-linux-amd64.tar.gz" \
            -o tools/sing-box.tar.gz
          tar -xzf tools/sing-box.tar.gz -C tools/ --strip-components=1 \
            --wildcards "*/sing-box"
          chmod +x tools/sing-box
          tools/sing-box version

      - name: Fetch sources
        run: uv run python scripts/fetch.py

      - name: Notify bot — fetch warnings
        if: ${{ vars.BOT_API_URL != '' }}
        continue-on-error: true
        env:
          BOT_API_URL: ${{ vars.BOT_API_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}
        run: |
          if [ ! -f data/.fetch-status.json ]; then exit 0; fi
          WARNINGS=$(uv run python3 -c "
          import json
          status = json.load(open('data/.fetch-status.json'))
          stale = [f'{k}: {v} consecutive empty fetches' for k, v in status.items() if v >= 3]
          if stale:
              print(json.dumps({'type':'warning','warnings':stale,'fetch_status':status}))
          ")
          if [ -n "$WARNINGS" ]; then
            curl -sf -X POST "${BOT_API_URL}/api/notify" \
              -H "Authorization: Bearer ${BOT_API_SECRET}" \
              -H "Content-Type: application/json" \
              -d "$WARNINGS"
          fi

      - name: Build outputs
        run: uv run python scripts/build.py

      - name: Test outputs
        id: test
        run: |
          EXIT_CODE=0
          OUTPUT=$(uv run python scripts/test.py 2>&1) || EXIT_CODE=$?
          echo "$OUTPUT"
          echo "output<<EOFTEST" >> "$GITHUB_OUTPUT"
          echo "$OUTPUT" >> "$GITHUB_OUTPUT"
          echo "EOFTEST" >> "$GITHUB_OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then exit $EXIT_CODE; fi
          echo "$OUTPUT" | grep -q "^FAILED" && exit 1 || true

      - name: Notify bot — test results
        if: ${{ always() && vars.BOT_API_URL != '' && steps.test.outputs.output != '' }}
        continue-on-error: true
        env:
          BOT_API_URL: ${{ vars.BOT_API_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}
          TEST_OUTPUT: ${{ steps.test.outputs.output }}
        run: |
          if [ "${{ steps.test.outcome }}" = "success" ]; then
            export PASSED="true"
          else
            export PASSED="false"
          fi
          uv run python3 -c "
          import json, os
          with open('/tmp/test-payload.json', 'w') as f:
              json.dump({
                  'type': 'test_result',
                  'passed': os.environ.get('PASSED') == 'true',
                  'output': os.environ.get('TEST_OUTPUT', '')
              }, f)
          "
          curl -sf -X POST "${BOT_API_URL}/api/notify" \
            -H "Authorization: Bearer ${BOT_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d @/tmp/test-payload.json

      - name: Generate release tag
        id: tag
        run: echo "tag=$(date -u +%Y%m%d%H%M)" >> "$GITHUB_OUTPUT"

      - name: Generate release body
        id: body
        run: |
          BODY=$(uv run python3 -c "
          import pathlib, yaml

          descs = {}
          for yf in sorted(pathlib.Path('sources').glob('category-*.yml')):
              cfg = yaml.safe_load(yf.read_text())
              cat_name = cfg['name'].replace('category-', '')
              d = cfg.get('description', {})
              descs[cat_name] = d.get('en', '') if isinstance(d, dict) else str(d)

          cats = {}
          for f in sorted(pathlib.Path('data').glob('category-*.txt')):
              name = f.stem
              count = sum(1 for line in f.read_text().splitlines() if line.strip())
              base = name.rsplit('-', 1)[0]
              suffix = name.rsplit('-', 1)[1]
              if base not in cats:
                  cats[base] = {'ip': 0, 'domain': 0}
              cats[base][suffix] = count

          lines = []
          lines.append('Automated build from upstream threat intelligence sources.')
          lines.append('')
          lines.append('## Stats')
          lines.append('')
          lines.append('| Category | Description | IPs | Domains |')
          lines.append('|:---------|:------------|:----|:--------|')
          total_ip = 0
          total_domain = 0
          for name, counts in sorted(cats.items()):
              label = name.replace('category-', '')
              desc = descs.get(label, '')
              ip = counts['ip']
              domain = counts['domain']
              total_ip += ip
              total_domain += domain
              ip_s = f'{ip:,}' if ip else '—'
              domain_s = f'{domain:,}' if domain else '—'
              lines.append(f'| {label} | {desc} | {ip_s} | {domain_s} |')
          lines.append(f'| **Total** | | **{total_ip:,}** | **{total_domain:,}** |')
          lines.append('')
          lines.append('## Files')
          lines.append('')
          lines.append('| File | Description |')
          lines.append('|:-----|:------------|')
          lines.append('| \`abuse-geoip.dat\` | Xray/V2Ray geoip database |')
          lines.append('| \`abuse-geosite.dat\` | Xray/V2Ray geosite database |')
          lines.append('| \`abuse-geoip.db\` | sing-box MaxMind MMDB |')
          lines.append('| \`abuse-category-*.srs\` | sing-box rule-sets per category |')
          lines.append('| \`abuse-category-*.txt\` | Plain IP/domain lists |')

          print('\n'.join(lines))
          ")
          {
            echo "body<<EOFBODY"
            echo "$BODY"
            echo "EOFBODY"
          } >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "Data ${{ steps.tag.outputs.tag }}"
          body: ${{ steps.body.outputs.body }}
          files: |
            output/abuse-geoip.dat
            output/abuse-geosite.dat
            output/abuse-geoip.db
            output/srs/*.srs
            output/txt/*.txt
          make_latest: true

      - name: Notify bot — new release
        if: ${{ vars.BOT_API_URL != '' }}
        continue-on-error: true
        env:
          BOT_API_URL: ${{ vars.BOT_API_URL }}
          BOT_API_SECRET: ${{ secrets.BOT_API_SECRET }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          TAG="${{ steps.tag.outputs.tag }}"
          STATS=$(uv run python3 -c "
          import json, pathlib, yaml
          stats = {}
          for f in sorted(pathlib.Path('data').glob('category-*.txt')):
              count = sum(1 for line in f.read_text().splitlines() if line.strip())
              stats[f.stem] = count
          descs = {}
          for yf in sorted(pathlib.Path('sources').glob('category-*.yml')):
              cfg = yaml.safe_load(yf.read_text())
              cat_name = cfg['name'].replace('category-', '')
              d = cfg.get('description', {})
              descs[cat_name] = d.get('en', '') if isinstance(d, dict) else str(d)
          print(json.dumps({'stats': stats, 'descriptions': descs}))
          ")
          PAYLOAD=$(uv run python3 -c "
          import json, sys
          data = json.loads(sys.argv[1])
          print(json.dumps({
              'type': 'release',
              'tag': sys.argv[2],
              'url': f'{sys.argv[3]}/releases/tag/{sys.argv[2]}',
              'stats': data['stats'],
              'descriptions': data['descriptions']
          }))
          " "$STATS" "$TAG" "$REPO_URL")
          curl -sf -X POST "${BOT_API_URL}/api/notify" \
            -H "Authorization: Bearer ${BOT_API_SECRET}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
