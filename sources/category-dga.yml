name: category-dga
type: domain
description:
  ru: "Домены, сгенерированные алгоритмами генерации доменов (DGA) малвари. Используются ботнетами для обхода блокировок C2."
  en: "Domains generated by malware Domain Generation Algorithms (DGA). Used by botnets to evade C2 blocking."

flags:
  high_false_positive:
    value: true
    description:
      ru: "DGA-алгоритмы генерируют случайные строки, часть которых совпадает с легитимными или будущими доменами. Ложные срабатывания неизбежны. Используйте только если понимаете риски."
      en: "DGA algorithms generate random strings, some of which match legitimate or future domains. False positives are unavoidable. Use only if you understand the risks."
  high_volatility:
    value: true
    description:
      ru: "Ботнеты генерируют тысячи новых DGA-доменов ежедневно. Список устаревает быстро."
      en: "Botnets generate thousands of new DGA domains daily. The list becomes stale quickly."
  controversial:
    value: false
    description:
      ru: "Концептуально трафик нежелателен, но высокий false positive rate делает применение спорным"
      en: "Conceptually traffic is unwanted, but high false positive rate makes application questionable"
  large_dataset:
    value: true
    description:
      ru: "Список может содержать десятки тысяч доменов, что влияет на производительность роутинга"
      en: "List may contain tens of thousands of domains, impacting routing performance"

sources:
  - name: bambenek-dga
    url: https://faf.bambenekconsulting.com/feeds/dga-feed.txt
    format: text
    comment_char: "#"
    separator: ","
    field: 0
